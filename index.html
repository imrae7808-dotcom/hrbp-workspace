<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#333;font-size:14px;line-height:1.5}
.layout{display:flex;height:100vh}
.sidebar{width:200px;background:#fff;border-right:1px solid #e8e8e8;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{height:48px;display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid #e8e8e8}
.sidebar-logo svg{width:22px;height:22px;flex-shrink:0}
.sidebar-logo span{font-size:14px;font-weight:600;color:#333}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:all .2s;font-size:13px;color:#666}
.nav-item:hover{background:#f5f7fa;color:#333}
.nav-item.active{background:#e6f7ff;color:#1890ff;border-right:3px solid #1890ff}
.nav-group{padding:0}
.nav-group-title{font-size:12px;color:#666;padding:10px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.nav-group-items{display:none}
.nav-group.open .nav-group-items{display:block}
.nav-group-items .nav-item{padding-left:28px;font-size:12px}
.topbar{height:48px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.topbar-left{font-size:14px;color:#333}
.topbar-right{display:flex;align-items:center;gap:16px;font-size:13px;color:#666}
.topbar-right .user{display:flex;align-items:center;gap:6px}
.topbar-right .avatar{width:28px;height:28px;border-radius:50%;background:#ff6900;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px}
.lang-toggle{display:flex;border:1px solid #d9d9d9;border-radius:4px;overflow:hidden}
.lang-btn{padding:4px 10px;font-size:12px;cursor:pointer;border:none;background:#fff;color:#666}
.lang-btn.active{background:#1890ff;color:#fff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;overflow-y:auto;padding:20px;background:#f5f7fa}
.page-title{font-size:18px;font-weight:600;margin-bottom:16px}
.card{background:#fff;border-radius:8px;border:1px solid #e8e8e8;padding:16px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.card-link{font-size:12px;color:#1890ff;cursor:pointer}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
.stat-card{text-align:center;padding:12px 8px}
.stat-value{font-size:28px;font-weight:600}
.stat-label{font-size:12px;color:#999;margin-top:4px}
.nine-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.grid-cell{padding:12px 8px;border-radius:6px;cursor:pointer;transition:all .2s;min-height:80px}
.grid-cell:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid-label{font-size:10px;color:#999;margin-bottom:4px}
.grid-names{font-size:12px;line-height:1.6}
.radar-wrap{display:flex;justify-content:center;padding:16px 0}
.claim-item{padding:8px 12px;background:#fafafa;border-radius:4px;margin-bottom:6px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .2s}
.claim-item:hover{background:#f0f5ff}
.claim-type{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500}
.claim-type.leadership{background:#fff1f0;color:#f5222d}
.claim-type.sales{background:#e6f7ff;color:#1890ff}
.claim-type.delivery{background:#f6ffed;color:#52c41a}
.claim-type.domain{background:#f9f0ff;color:#722ed1}
.claim-type.customer{background:#fff7e6;color:#fa8c16}
.claim-type.project{background:#e6fffb;color:#13c2c2}
.claim-type.technical{background:#f0f0f0;color:#666}
.pattern-card{background:#fafafa;border-radius:6px;padding:12px;margin-bottom:8px;border-left:3px solid #1890ff;cursor:pointer;transition:all .2s}
.pattern-card:hover{background:#f0f5ff}
.pattern-card.failure{border-left-color:#f5222d}
.pattern-type{font-size:10px;padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:6px}
.pattern-type.success{background:#e6f7ff;color:#1890ff}
.pattern-type.failure{background:#fff1f0;color:#f5222d}
.pattern-text{font-size:12px;margin-bottom:4px}
.pattern-meta{font-size:11px;color:#999}
.score-bar{height:8px;border-radius:4px;background:#f0f0f0;overflow:hidden;margin:4px 0}
.score-bar .fill{height:100%;border-radius:4px;transition:width .6s}
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.score-label{font-size:12px;color:#666;width:80px}
.score-value{font-size:13px;font-weight:600;width:40px;text-align:right}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:8px;padding:20px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.modal-close{cursor:pointer;font-size:18px;color:#999}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;margin:2px}
.tag.green{background:#f6ffed;color:#52c41a}
.tag.blue{background:#e6f7ff;color:#1890ff}
.tag.red{background:#fff1f0;color:#f5222d}
.tag.yellow{background:#fffbe6;color:#faad14}
.ref-card{background:#fafafa;border-radius:6px;padding:10px;margin-top:8px;border:1px solid #f0f0f0}
.ref-card .ref-title{font-size:11px;font-weight:600;color:#666;margin-bottom:4px}
.ref-card .ref-text{font-size:12px;color:#333;line-height:1.6}
</style>
</head>

// SVG Radar
function makeRadar(obj){
  var keys=Object.keys(obj),vals=Object.values(obj),n=keys.length;
  var cx=130,cy=120,r=90;
  var pts=[];
  for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;pts.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)})}
  var svg='<svg viewBox="0 0 260 240" width="260" height="240">';
  for(var j=1;j<=4;j++){svg+='<polygon points="'+pts.map(function(p){return (cx+(p.x-cx)*j/4)+','+(cy+(p.y-cy)*j/4)}).join(' ')+'" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>'}
  svg+='<polygon points="'+pts.map(function(p){return p.x+','+p.y}).join(' ')+'" fill="none" stroke="#e8e8e8" stroke-width="1"/>';
  var dataPoly=pts.map(function(p,i){return (cx+r*(vals[i]/100)*Math.cos(Math.PI*2*i/n-Math.PI/2))+','+(cy+r*(vals[i]/100)*Math.sin(Math.PI*2*i/n-Math.PI/2))}).join(' ');
  svg+='<polygon points="'+dataPoly+'" fill="rgba(24,144,255,0.15)" stroke="#1890ff" stroke-width="1.5"/>';
  pts.forEach(function(p,i){
    var lx=p.x+(p.x-cx)*0.18,ly=p.y+(p.y-cy)*0.18;
    svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p.x+'" y2="'+p.y+'" stroke="#e8e8e8" stroke-width="0.5"/>';
    svg+='<text x="'+lx+'" y="'+ly+'" text-anchor="middle" font-size="10" fill="#999">'+keys[i]+'</text>';
    svg+='<circle cx="'+(cx+r*(vals[i]/100)*Math.cos(Math.PI*2*i/n-Math.PI/2))+'" cy="'+(cy+r*(vals[i]/100)*Math.sin(Math.PI*2*i/n-Math.PI/2))+'" r="3" fill="#1890ff"/>';
  });
  svg+='</svg>';
  return svg;
}
