*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#333;font-size:14px;line-height:1.5}
.layout{display:flex;height:100vh}
.sidebar{width:200px;background:#fff;border-right:1px solid #e8e8e8;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{height:48px;display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid #e8e8e8}
.sidebar-logo svg{width:22px;height:22px;flex-shrink:0}
.sidebar-logo span{font-size:14px;font-weight:600;color:#333}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:all .2s;font-size:13px;color:#666}
.nav-item:hover{background:#f5f7fa;color:#333}
.nav-item.active{background:#e6f7ff;color:#1890ff;border-right:3px solid #1890ff}
.nav-group{padding:0}
.nav-group-title{font-size:12px;color:#666;padding:10px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.nav-group-items{display:none}
.nav-group.open .nav-group-items{display:block}
.nav-group-items .nav-item{padding-left:28px;font-size:12px}
.topbar{height:48px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.topbar-left{font-size:14px;color:#333}
.topbar-right{display:flex;align-items:center;gap:16px;font-size:13px;color:#666}
.topbar-right .user{display:flex;align-items:center;gap:6px}
.topbar-right .avatar{width:28px;height:28px;border-radius:50%;background:#ff6900;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px}
.lang-toggle{display:flex;border:1px solid #d9d9d9;border-radius:4px;overflow:hidden}
.lang-btn{padding:4px 10px;font-size:12px;cursor:pointer;border:none;background:#fff;color:#666}
.lang-btn.active{background:#1890ff;color:#fff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;overflow-y:auto;padding:20px;background:#f5f7fa}
.page-title{font-size:18px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.card{background:#fff;border-radius:8px;border:1px solid #e8e8e8;padding:16px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.card-link{font-size:12px;color:#1890ff;cursor:pointer}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
.stat-card{text-align:center;padding:12px 8px}
.stat-value{font-size:28px;font-weight:600}
.stat-label{font-size:12px;color:#999;margin-top:4px}
.nine-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.grid-cell{padding:12px 8px;border-radius:6px;cursor:pointer;transition:all .2s;min-height:80px}
.grid-cell:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid-cell.drag-over{outline:2px dashed #1890ff;outline-offset:-2px;background:#e6f7ff!important}
.grid-label{font-size:10px;color:#999;margin-bottom:4px}
.grid-names{font-size:12px;line-height:1.6}
.radar-wrap{display:flex;justify-content:center;padding:16px 0}
.claim-item{padding:8px 12px;background:#fafafa;border-radius:4px;margin-bottom:6px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .2s}
.claim-item:hover{background:#f0f5ff}
.claim-type{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500}
.claim-type.leadership{background:#fff1f0;color:#f5222d}
.claim-type.sales{background:#e6f7ff;color:#1890ff}
.claim-type.delivery{background:#f6ffed;color:#52c41a}
.claim-type.domain{background:#f9f0ff;color:#722ed1}
.claim-type.customer{background:#fff7e6;color:#fa8c16}
.claim-type.project{background:#e6fffb;color:#13c2c2}
.claim-type.technical{background:#f0f0f0;color:#666}
.pattern-card{background:#fafafa;border-radius:6px;padding:12px;margin-bottom:8px;border-left:3px solid #1890ff;cursor:pointer;transition:all .2s}
.pattern-card:hover{background:#f0f5ff}
.pattern-card.failure{border-left-color:#f5222d}
.pattern-type{font-size:10px;padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:6px}
.pattern-type.success{background:#e6f7ff;color:#1890ff}
.pattern-type.failure{background:#fff1f0;color:#f5222d}
.pattern-text{font-size:12px;margin-bottom:4px}
.pattern-meta{font-size:11px;color:#999}
.score-bar{height:8px;border-radius:4px;background:#f0f0f0;overflow:hidden;margin:4px 0}
.score-bar .fill{height:100%;border-radius:4px;transition:width .6s}
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.score-label{font-size:12px;color:#666;width:80px}
.score-value{font-size:13px;font-weight:600;width:40px;text-align:right}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:8px;padding:20px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.modal-close{cursor:pointer;font-size:18px;color:#999}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;margin:2px}
.tag.green{background:#f6ffed;color:#52c41a}
.tag.blue{background:#e6f7ff;color:#1890ff}
.tag.red{background:#fff1f0;color:#f5222d}
.tag.yellow{background:#fffbe6;color:#faad14}
.ref-card{background:#fafafa;border-radius:6px;padding:10px;margin-top:8px;border:1px solid #f0f0f0}
.ref-card .ref-title{font-size:11px;font-weight:600;color:#666;margin-bottom:4px}
.ref-card .ref-text{font-size:12px;color:#333;line-height:1.6}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn-primary{background:#1890ff;color:#fff}.btn-primary:hover{background:#40a9ff}
.btn-danger{background:#f5222d;color:#fff}.btn-danger:hover{background:#ff4d4f}
.btn-ghost{background:#fff;border:1px solid #d9d9d9;color:#666}.btn-ghost:hover{border-color:#1890ff;color:#1890ff}
.btn-success{background:#52c41a;color:#fff}.btn-success:hover{background:#73d13d}
.btn-sm{padding:4px 10px;font-size:12px}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:#666;margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;font-family:inherit;outline:none;transition:border .2s}
.form-input:focus{border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.15)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
select.form-input{appearance:auto}
.search-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px}
.emp-row{display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .2s}
.emp-row:hover{background:#fafafa}
.emp-row.dragging{opacity:.4;background:#f0f5ff}
.emp-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.emp-info{flex:1}
.emp-name{font-size:13px;font-weight:500}
.emp-pos{font-size:11px;color:#999}
.emp-actions{display:flex;gap:4px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:6px;font-size:13px;color:#fff;z-index:2000;animation:slideIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.success{background:#52c41a}
.toast.error{background:#f5222d}
.toast.info{background:#1890ff}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>

function exportCSV(){
  var header="ID,姓名,岗位,部门,资历,入职时间,招聘分数,绩效等级,九宫格分类\n";
  var rows=EMP.map(function(e){return [e.id,e.name,e.pos,e.dept,e.lv,e.hire,e.score,e.perf,e.grid].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"'}).join(',')}).join('\n');
  var blob=new Blob(['﻿'+header+rows],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hrbp_employees.csv';a.click();
  showToast(T('导出成功'));
}
function importCSV(){
  var input=document.createElement('input');input.type='file';input.accept='.csv';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var text=ev.target.result;var lines=text.split('\n').filter(function(l){return l.trim()});var imported=0;
      for(var i=1;i<lines.length;i++){
        var cols=lines[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);if(!cols||cols.length<5)continue;
        var clean=function(s){return s.replace(/^"|"$/g,'').trim()};
        var d={name:clean(cols[1]),pos:clean(cols[2]),dept:clean(cols[3]),lv:clean(cols[4]),
          hire:cols[5]?clean(cols[5]):'',score:parseInt(cols[6])||3,perf:cols[7]?clean(cols[7]):'B'};
        if(!d.name)continue;d.id=genId();d.grid=getGrid(d.score,d.perf);d.perfH=[];d.claims=[];d.radar={};
        EMP.push(d);imported++;
      }
      saveData();showToast(T('导入成功，新增 ')+imported+T(' 人'));closeModal();renderPage();
    };
    reader.readAsText(file);
  };input.click();
}
function exportJSON(){
  var data={employees:EMP,patterns:PATTERNS,exportDate:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hrbp_backup.json';a.click();
  showToast(T('备份已导出'));
}
function importJSON(){
  var input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{var data=JSON.parse(ev.target.result);if(data.employees){EMP=data.employees;saveData()}if(data.patterns){PATTERNS=data.patterns;saveData()}showToast(T('恢复成功'));closeModal();renderPage()}
      catch(x){showToast(T('文件格式错误'),'error')}
    };
    reader.readAsText(file);
  };input.click();
}

// ==================== SVG RADAR ====================
function makeRadar(obj){
  var keys=Object.keys(obj),vals=Object.values(obj),n=keys.length;
  if(n===0)return'<svg viewBox="0 0 260 240" width="260" height="240"><text x="130" y="120" text-anchor="middle" fill="#999" font-size="12">'+T('暂无数据')+'</text></svg>';
  var cx=130,cy=120,r=90,pts=[];
  for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;pts.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)})}
  var svg='<svg viewBox="0 0 260 240" width="260" height="240">';
  for(var j=1;j<=4;j++){svg+='<polygon points="'+pts.map(function(p){return (cx+(p.x-cx)*j/4)+','+(cy+(p.y-cy)*j/4)}).join(' ')+'" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>'}
  svg+='<polygon points="'+pts.map(function(p){return p.x+','+p.y}).join(' ')+'" fill="none" stroke="#e8e8e8" stroke-width="1"/>';
  var dp=pts.map(function(p,i){return (cx+r*(vals[i]/100)*Math.cos(Math.PI*2*i/n-Math.PI/2))+','+(cy+r*(vals[i]/100)*Math.sin(Math.PI*2*i/n-Math.PI/2))}).join(' ');
  svg+='<polygon points="'+dp+'" fill="rgba(24,144,255,0.15)" stroke="#1890ff" stroke-width="1.5"/>';
  pts.forEach(function(p,i){
    var lx=p.x+(p.x-cx)*0.18,ly=p.y+(p.y-cy)*0.18;
    svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p.x+'" y2="'+p.y+'" stroke="#e8e8e8" stroke-width="0.5"/>';
    svg+='<text x="'+lx+'" y="'+ly+'" text-anchor="middle" font-size="10" fill="#999">'+keys[i]+'</text>';
    svg+='<circle cx="'+(cx+r*(vals[i]/100)*Math.cos(Math.PI*2*i/n-Math.PI/2))+'" cy="'+(cy+r*(vals[i]/100)*Math.sin(Math.PI*2*i/n-Math.PI/2))+'" r="3" fill="#1890ff"/>';
  });
  svg+='</svg>';return svg;
}

// ==================== PAGE: REVIEW (NINE GRID) ====================
function renderReview(el){
  var gridMap={"低绩效人才":[],"待观察人才":[],"基础合格人才":[],"高潜人才":[],"核心骨干":[]};
  EMP.forEach(function(e){if(gridMap[e.grid])gridMap[e.grid].push(e.name)});
  var cells=[
    {name:"低绩效",color:"#fff1f0",text:"#f5222d",gridKey:"低绩效人才"},
    {name:"待观察",color:"#fffbe6",text:"#faad14",gridKey:"待观察人才"},
    {name:"基础合格",color:"#f5f5f5",text:"#999",gridKey:"基础合格人才"},
    {name:"待提升",color:"#fff7e6",text:"#fa8c16",gridKey:null},
    {name:"待发展",color:"#e6f7ff",text:"#1890ff",gridKey:null},
    {name:"高潜人才",color:"#e6f7ff",text:"#1890ff",gridKey:"高潜人才"},
    {name:"低潜力",color:"#fff1f0",text:"#f5222d",gridKey:null},
    {name:"成长型",color:"#fffbe6",text:"#faad14",gridKey:null},
    {name:"核心骨干",color:"#f6ffed",text:"#52c41a",gridKey:"核心骨干"}
  ];
  el.innerHTML='<div class="page-title">'+T("人才盘点 — 九宫格")+'</div>'
  +'<div class="card"><div class="card-header"><div class="card-title"><span class="dot" style="background:#722ed1"></span>'+T("绩效 × 能力矩阵 — 拖拽员工调整分类")+'</div></div>'
  +'<div class="nine-grid">'
  +cells.map(function(c){

    return '<div class="grid-cell" style="background:'+c.color+'" ondragover="onGridDragOver(event)" ondragleave="onGridDragLeave(event)" ondrop="onGridDrop(event,\''+(c.gridKey||c.name+'人才')+'\')">'
    +'<div class="grid-label" style="color:'+c.text+'">'+c.name+'</div>'
    +'<div class="grid-names" style="color:'+c.text+'">'+(items.length?items.join("\n"):"—")+'</div></div>'}).join("")
  +'</div></div>'
  +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
  +'<div class="card"><div class="card-title">'+T("分布统计")+'</div><div style="margin-top:8px">'
  +cells.filter(function(c){return c.gridKey&&gridMap[c.gridKey].length>0}).map(function(c){
    var items=gridMap[c.gridKey];
    return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><div style="width:8px;height:8px;border-radius:2px;background:'+c.text+'"></div><span style="font-size:12px;width:80px;color:#666">'+c.name+'</span><div style="flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden"><div style="height:100%;width:'+Math.round(items.length/EMP.length*100)+'%;background:'+c.text+';border-radius:3px;opacity:.6"></div></div><span style="font-size:12px;color:'+c.text+';width:20px;text-align:right">'+items.length+'</span></div>'}).join("")
  +'</div></div>'
  +'<div class="card"><div class="card-title">'+T("关键发现")+'</div><div style="margin-top:8px;font-size:12px;color:#666;line-height:1.8">'
  +'<div><span class="tag green">'+T('核心骨干')+' '+gridMap["核心骨干"].length+'人</span></div>'
  +'<div style="margin-top:6px"><span class="tag blue">'+T('高潜人才')+' '+gridMap["高潜人才"].length+'人</span></div>'
  +'<div style="margin-top:6px"><span class="tag red">'+T('低绩效')+' '+gridMap["低绩效人才"].length+'人</span></div>'

// ==================== PAGE: LEARNING ====================
function renderLearning(el){
  var suc=PATTERNS.filter(function(p){return p.type==="success"});
  var fail=PATTERNS.filter(function(p){return p.type==="failure"});
  el.innerHTML='<div class="page-title">'+T("学习洞察 — 系统从数据中学到了什么")+'<button class="btn btn-primary btn-sm" onclick="showModal(\''+T("新增模式")+'\',patternFormHTML())">+ '+T("新增模式")+'</button></div>'
  +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
  +'<div class="card"><div class="card-header"><div class="card-title"><span class="dot" style="background:#52c41a"></span>'+T("成功模式")+'</div><span class="tag green">'+suc.length+'</span></div><div style="margin-top:8px">'
  +suc.map(function(p){var idx=PATTERNS.indexOf(p);return '<div class="pattern-card" onclick="showPatternModal('+idx+')"><div class="pattern-type success">'+T("成功")+' · '+p.conf+'</div><div class="pattern-text">'+p.text+'</div><div class="pattern-meta">📊 '+p.ev.length+' '+T("个员工")+' <span style="color:#f5222d;cursor:pointer;float:right" onclick="deletePattern('+idx+');event.stopPropagation()">✕</span></div></div>'}).join("")
  +'</div></div>'
  +'<div class="card"><div class="card-header"><div class="card-title"><span class="dot" style="background:#f5222d"></span>'+T("失败模式")+'</div><span class="tag red">'+fail.length+'</span></div><div style="margin-top:8px">'
  +fail.map(function(p){var idx=PATTERNS.indexOf(p);return '<div class="pattern-card failure" onclick="showPatternModal('+idx+')"><div class="pattern-type failure">'+T("失败")+' · '+p.conf+'</div><div class="pattern-text">'+p.text+'</div><div class="pattern-meta">📊 '+p.ev.length+' '+T("个员工")+' <span style="color:#f5222d;cursor:pointer;float:right" onclick="deletePattern('+idx+');event.stopPropagation()">✕</span></div></div>'}).join("")
  +'</div></div></div>'
  +'<div class="card"><div class="card-title">'+T("学习闭环")+'</div><div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 0;flex-wrap:wrap">'
  +["招聘入职","绩效评估","模式提取","优化招聘","评分提升"].map(function(s,i){return '<div style="background:'+["#e6f7ff","#f6ffed","#f9f0ff","#fff7e6","#e6f7ff"][i]+';padding:8px 14px;border-radius:6px;font-size:12px">'+s+'</div>'+(i<4?'<span style="color:#999">→</span>':'')}).join("")
  +'</div></div>';
}
function showPatternModal(idx){
  var p=PATTERNS[idx];if(!p)return;
  var html='<div style="margin-bottom:12px"><div class="pattern-type '+p.type+'" style="font-size:12px">'+T(p.type==="success"?"成功模式":"失败模式")+' · '+T("置信度")+' '+p.conf+'</div>'
  +'<div style="font-size:13px;line-height:1.8;margin-top:8px">'+p.text+'</div></div>'
  +'<div style="font-size:12px;color:#666;margin-bottom:12px;padding:10px;background:#fafafa;border-radius:6px">'+(p.detail||'')+'</div>'
  +'<div style="font-size:12px;font-weight:600;color:#333;margin-bottom:8px">'+T("支撑员工")+'</div>'
  +(p.ev||[]).map(function(e){return '<div style="font-size:12px;color:#666;padding:6px 0;border-bottom:1px solid #f0f0f0">• '+e+'</div>'}).join("");
  showModal(T(p.type==="success"?"成功模式详情":"失败模式详情"),html);
}
